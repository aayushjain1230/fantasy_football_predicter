services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: sqlite:////app/data/fourth_down.db
    ports: ["8000:8000"]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [backend]
    ports: ["3000:3000"]
